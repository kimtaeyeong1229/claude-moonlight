<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Moonlight — UI 프로토타입 (더미)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&family=Noto+Serif+KR:wght@400;600;700&display=swap" rel="stylesheet">
<script>
  window.MathJax = { tex:{inlineMath:[['$','$']], displayMath:[['$$','$$']]},
    options:{skipHtmlTags:['script','noscript','style','textarea','pre','code']} };
</script>
<script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js" async></script>
<style>
:root{
  --bg:#f7f7f5; --panel:#ffffff; --ink:#242424; --muted:#7a7a7a; --line:#e8e8e8;
  --accent:#1a8917; --accent-d:#136d12;
  --hl:rgba(56,132,255,.20);          /* 저채도 파랑 형광펜 (반대편) */
  --hl-strong:rgba(56,132,255,.34);   /* hover 한 쪽 약간 진하게 */
  --hl-border:rgba(56,132,255,.55);
  --maxw:62ch;
}
/* sepia / dark 테마 */
body.theme-dark{ --bg:#16181c; --panel:#1e2127; --ink:#d7dae0; --muted:#8b919c; --line:#2c3037;
  --hl:rgba(86,156,255,.26); --hl-strong:rgba(86,156,255,.42); --accent:#4caf50; --accent-d:#7bd17e; }

*{box-sizing:border-box;}
html,body{margin:0;height:100%;}
body{
  font-family:'Noto Sans KR',-apple-system,BlinkMacSystemFont,sans-serif;
  color:var(--ink); background:var(--bg);
  display:flex; flex-direction:column; height:100vh; overflow:hidden;
}

/* ---------------- Top bar ---------------- */
#topbar{
  display:flex; align-items:center; gap:14px; padding:10px 16px;
  background:var(--panel); border-bottom:1px solid var(--line); flex:0 0 auto; z-index:20;
}
#topbar .brand{ font-weight:900; font-size:1.05rem; letter-spacing:-.01em; }
#topbar .brand small{ color:var(--muted); font-weight:500; font-size:.72rem; margin-left:6px; }
#topbar .spacer{ flex:1; }
.seg{ display:inline-flex; border:1px solid var(--line); border-radius:9px; overflow:hidden; }
.seg button{
  border:none; background:var(--panel); color:var(--muted); cursor:pointer;
  font-family:inherit; font-size:.8rem; font-weight:700; padding:7px 12px;
}
.seg button.active{ background:var(--accent); color:#fff; }
.seg button:not(:last-child){ border-right:1px solid var(--line); }
.iconbtn{
  border:1px solid var(--line); background:var(--panel); color:var(--ink); cursor:pointer;
  font-family:inherit; font-size:.8rem; font-weight:700; padding:7px 11px; border-radius:9px;
}
.iconbtn.on{ border-color:var(--accent); color:var(--accent-d); background:rgba(26,137,23,.08); }
.label{ font-size:.72rem; color:var(--muted); font-weight:700; margin-right:-6px; }

/* reading progress */
#progress{ height:3px; background:transparent; flex:0 0 auto; }
#progress>div{ height:100%; width:0%; background:linear-gradient(90deg,var(--accent),#4caf50); transition:width .1s; }

/* ---------------- Body layout ---------------- */
#main{ flex:1; display:flex; min-height:0; }

/* outline sidebar */
#outline{
  width:230px; flex:0 0 auto; background:var(--panel); border-right:1px solid var(--line);
  overflow-y:auto; padding:16px 12px; transition:margin-left .22s;
}
body.outline-hidden #outline{ margin-left:-230px; }
#outline h4{ font-size:.7rem; letter-spacing:.08em; text-transform:uppercase; color:var(--muted); margin:0 6px 10px; }
#outline a{
  display:block; padding:7px 10px; border-radius:7px; font-size:.82rem; color:var(--ink);
  text-decoration:none; line-height:1.4; cursor:pointer;
}
#outline a:hover{ background:rgba(0,0,0,.05); }
#outline a.sub{ padding-left:20px; font-size:.78rem; color:var(--muted); }

/* two panes */
#panes{ flex:1; display:flex; min-width:0; }
.pane{ flex:1; overflow-y:auto; min-width:0; position:relative; }
.pane-head{
  position:sticky; top:0; z-index:5; backdrop-filter:saturate(1.2) blur(2px);
  background:color-mix(in srgb, var(--panel) 86%, transparent);
  padding:8px 0; text-align:center; font-size:.7rem; font-weight:800; letter-spacing:.1em;
  text-transform:uppercase; color:var(--muted); border-bottom:1px solid var(--line);
}
.pane.left .doc{ font-family:'Noto Serif KR', Georgia, serif; }       /* 원문(영문) */
.pane.right .doc{ font-family:'Noto Sans KR', sans-serif; }            /* 번역(한국어) */
.doc{ max-width:var(--maxw); margin:0 auto; padding:34px 30px 50vh; }
.pane.left .doc{ line-height:1.62; }                                   /* 라틴 행간 ~1.6 */
.pane.right .doc{ line-height:1.78; word-break:keep-all; }             /* 한국어 행간 ~1.78 */
#panes.left-only .pane.right, #panes.right-only .pane.left{ display:none; }

.doc h1{ font-size:1.7rem; font-weight:900; line-height:1.3; margin:.2em 0 .15em; }
.pane.right .doc h1{ font-family:'Noto Sans KR'; }
.doc .sub{ color:var(--muted); font-size:.9rem; margin:0 0 1.4em; }
.doc h2{ font-size:1.3rem; font-weight:800; margin:1.7em 0 .5em; scroll-margin-top:70px; }
.doc p{ margin:0 0 1.05em; }

/* sentence spans — hover linking */
.s{ border-radius:4px; padding:0 1px; transition:background .12s, box-shadow .12s; cursor:default; }
.s.hl{ background:var(--hl); }
.s.hl-src{ background:var(--hl-strong); box-shadow:0 0 0 1px var(--hl-border) inset; }

/* term tooltip */
.term{ border-bottom:1px dotted var(--accent); cursor:help; }
.tip{
  position:fixed; z-index:50; max-width:300px; background:#222; color:#fff;
  font-family:'Noto Sans KR'; font-size:.8rem; line-height:1.55; padding:9px 12px;
  border-radius:8px; box-shadow:0 6px 24px rgba(0,0,0,.28); pointer-events:none;
  opacity:0; transform:translateY(4px); transition:opacity .12s, transform .12s;
}
.tip.show{ opacity:1; transform:translateY(0); }
.tip b{ color:#7fb6ff; }

/* figures / tables — identical both sides */
.figure, .tablefig{ margin:1.8em 0; }
.figure img, .figbox{
  display:block; width:100%; border:1px solid var(--line); border-radius:8px; background:#fff;
}
.figbox{
  aspect-ratio:16/7; display:flex; align-items:center; justify-content:center;
  color:#9aa; font-size:.85rem; background:repeating-linear-gradient(45deg,#fafafa,#fafafa 10px,#f1f1f1 10px,#f1f1f1 20px);
}
body.theme-dark .figbox{ background:repeating-linear-gradient(45deg,#23262d,#23262d 10px,#1c1f25 10px,#1c1f25 20px); color:#667; }
.cap{ font-size:.84rem; color:var(--muted); text-align:center; margin-top:.6em; line-height:1.6; }
table.data{ width:100%; border-collapse:collapse; font-size:.84rem; }
table.data th,table.data td{ border:1px solid var(--line); padding:6px 9px; text-align:center; }
table.data thead th{ background:rgba(0,0,0,.06); }
table.data strong{ color:var(--accent-d); }
.eq{ text-align:center; margin:1.3em 0; overflow-x:auto; }

/* focus mode */
body.focus #panes .s{ opacity:.32; transition:opacity .14s; }
body.focus #panes .s.hl, body.focus #panes .s.hl-src{ opacity:1; }

/* hidden by pass */
.hide-pass{ display:none !important; }

@media (max-width:900px){ #outline{position:absolute;height:100%;z-index:15;} }
</style>
</head>
<body class="theme-light">

<div id="topbar">
  <span class="brand">🌙 Moonlight <small>UI 프로토타입 · 더미 데이터</small></span>
  <button class="iconbtn" id="btnOutline" title="아웃라인">☰ 목차</button>

  <span class="spacer"></span>

  <span class="label">읽기 단계</span>
  <span class="seg" id="passSeg">
    <button data-pass="skim">훑기</button>
    <button data-pass="read" class="active">읽기</button>
    <button data-pass="deep">정독</button>
  </span>

  <span class="label">보기</span>
  <span class="seg" id="viewSeg">
    <button data-view="both" class="active">반반</button>
    <button data-view="left-only">원문</button>
    <button data-view="right-only">번역</button>
  </span>

  <button class="iconbtn" id="btnFocus" title="집중 모드: 가리킨 문장만 부각">🎯 집중</button>
  <button class="iconbtn" id="btnSync" class="on" title="스크롤 동기화">🔗 싱크</button>

  <span class="label">테마</span>
  <span class="seg" id="themeSeg">
    <button data-theme="light" class="active">밝게</button>
    <button data-theme="dark">어둡게</button>
  </span>
</div>
<div id="progress"><div></div></div>

<div id="main">
  <nav id="outline"><h4>목차 / Outline</h4><div id="outlineList"></div></nav>
  <div id="panes">
    <section class="pane left"><div class="pane-head">원문 · Original (EN)</div><div class="doc" id="docL"></div></section>
    <section class="pane right"><div class="pane-head">번역 · 한국어</div><div class="doc" id="docR"></div></section>
  </div>
</div>

<div class="tip" id="tip"></div>

<script>
/* ============================================================
   더미 논문 데이터 (영문 원문 ↔ 한국어 번역, 문장 단위 매핑)
   각 문장 s 는 동일한 sid 로 좌/우 연결된다.
   pass: 'core' 항상표시 | 'read' 읽기+정독 | 'deep' 정독에서만
   ============================================================ */
const PAPER = {
  titleEn: "Sparse Attention for Efficient Long-Context Transformers",
  titleKo: "효율적 장문맥 트랜스포머를 위한 희소 어텐션",
  meta: "Jane Doe, et al. · NeurIPS 2025 · arXiv:2509.01234 (더미)",
  blocks: [
    {type:'h1'},
    {type:'h2', id:'sec-abs', sid:'h-abs', en:'Abstract', ko:'초록'},
    {type:'p', pass:'core', ss:[
      {sid:'a1', en:'Transformers struggle to scale to long contexts because self-attention costs grow quadratically with sequence length.',
              ko:'트랜스포머는 셀프 어텐션 비용이 시퀀스 길이에 따라 제곱으로 증가하기 때문에 긴 문맥으로 확장하기 어렵다.'},
      {sid:'a2', en:'We introduce <T def="질의(query)가 모든 키를 보지 않고 일부 블록만 참조하도록 제한하는 어텐션 방식.">block-sparse attention</T> that attends only to a learned subset of key blocks.',
              ko:'우리는 학습된 일부 키 블록에만 주의를 기울이는 <T def="질의가 모든 키를 보지 않고 일부 블록만 참조하도록 제한하는 어텐션 방식.">블록 희소 어텐션</T>을 제안한다.'},
      {sid:'a3', en:'On documents of up to 64k tokens, our method matches dense attention while using 4.1x less memory.',
              ko:'최대 6만 4천 토큰 문서에서, 우리 방법은 밀집(dense) 어텐션과 동등한 성능을 내면서 메모리는 4.1배 적게 쓴다.'},
    ]},

    {type:'h2', id:'sec-intro', sid:'h-intro', en:'1. Introduction', ko:'1. 서론'},
    {type:'p', pass:'read', ss:[
      {sid:'i1', en:'Long-context modeling is central to tasks such as document summarization and code understanding.',
              ko:'장문맥 모델링은 문서 요약, 코드 이해 같은 과제의 핵심이다.'},
      {sid:'i2', en:'However, the memory footprint of full attention quickly becomes prohibitive beyond a few thousand tokens.',
              ko:'그러나 완전(full) 어텐션의 메모리 사용량은 수천 토큰만 넘어도 금세 감당하기 어려워진다.'},
      {sid:'i3', en:'Prior work explores fixed sparsity patterns, but these often hurt accuracy on tasks needing global context.',
              ko:'기존 연구는 고정된 희소 패턴을 탐구했지만, 이는 전역 문맥이 필요한 과제에서 정확도를 떨어뜨리는 경우가 많다.'},
    ]},
    {type:'p', pass:'deep', ss:[
      {sid:'i4', en:'In contrast, we let the model learn which blocks to attend to, adapting sparsity per input.',
              ko:'반면 우리는 어떤 블록에 주의할지를 모델이 학습하도록 하여, 입력마다 희소성을 적응적으로 조정한다.'},
      {sid:'i5', en:'This paper makes three contributions, summarized at the end of this section.',
              ko:'본 논문은 이 절 끝에 요약된 세 가지 기여를 한다.'},
    ]},

    {type:'h2', id:'sec-method', sid:'h-method', en:'2. Method', ko:'2. 방법'},
    {type:'p', pass:'read', ss:[
      {sid:'m1', en:'We partition the sequence into blocks of size B and compute a routing score for each query-key block pair.',
              ko:'우리는 시퀀스를 크기 B 의 블록으로 나누고, 각 질의-키 블록 쌍에 대해 라우팅 점수를 계산한다.'},
      {sid:'m2', en:'Only the top-k blocks per query are kept, as defined below.',
              ko:'질의마다 상위 k개 블록만 유지하며, 이는 아래 식으로 정의된다.'},
    ]},
    {type:'eq', tex:'$$\\mathrm{Attn}(Q,K,V)=\\mathrm{softmax}\\!\\left(\\frac{Q K_{\\mathcal{S}}^\\top}{\\sqrt{d}}\\right)V_{\\mathcal{S}},\\quad \\mathcal{S}=\\mathrm{TopK}_k(\\text{route}(Q,K))$$'},
    {type:'figure', id:'fig-1', img:null,
      capEn:'Figure 1 | Block-sparse routing: each query block (rows) selects a few key blocks (columns).',
      capKo:'그림 1 | 블록 희소 라우팅: 각 질의 블록(행)이 소수의 키 블록(열)을 선택한다.'},
    {type:'p', pass:'deep', ss:[
      {sid:'m3', en:'The routing network is a lightweight MLP applied to mean-pooled block representations.',
              ko:'라우팅 네트워크는 평균 풀링된 블록 표현에 적용되는 경량 MLP 이다.'},
      {sid:'m4', en:'Because k is constant, the overall cost grows linearly with sequence length.',
              ko:'k 가 상수이므로 전체 비용은 시퀀스 길이에 대해 선형으로 증가한다.'},
    ]},

    {type:'h2', id:'sec-exp', sid:'h-exp', en:'3. Experiments', ko:'3. 실험'},
    {type:'p', pass:'read', ss:[
      {sid:'e1', en:'We evaluate on long-document QA and report accuracy alongside peak memory.',
              ko:'우리는 장문서 QA 에서 평가하며, 정확도와 최대 메모리를 함께 보고한다.'},
    ]},
    {type:'table', id:'tbl-1',
      capEn:'Table 1 | Accuracy and peak memory at 64k tokens (higher acc. / lower mem. is better).',
      capKo:'표 1 | 6만 4천 토큰에서의 정확도와 최대 메모리 (정확도↑ / 메모리↓ 가 좋음).',
      head:['Model','Acc.','Mem (GB)'],
      rows:[['Dense','71.2','38.4'],['Fixed-sparse','67.8','9.6'],['Ours','<b>71.0</b>','<b>9.3</b>']]},
    {type:'p', pass:'deep', ss:[
      {sid:'e2', en:'Our model nearly closes the gap to dense attention while cutting memory by over 4x.',
              ko:'우리 모델은 메모리를 4배 이상 줄이면서도 밀집 어텐션과의 격차를 거의 좁힌다.'},
    ]},

    {type:'h2', id:'sec-conc', sid:'h-conc', en:'4. Conclusion', ko:'4. 결론'},
    {type:'p', pass:'core', ss:[
      {sid:'c1', en:'Learned block sparsity offers a practical path to long-context Transformers without sacrificing accuracy.',
              ko:'학습된 블록 희소성은 정확도를 희생하지 않고 장문맥 트랜스포머로 가는 실용적인 길을 제시한다.'},
      {sid:'c2', en:'Future work includes extending the router to multi-modal inputs.',
              ko:'향후 연구로는 라우터를 멀티모달 입력으로 확장하는 것이 있다.'},
    ]},
  ]
};

/* ---------------- render ---------------- */
const docL = document.getElementById('docL'), docR = document.getElementById('docR');
const outlineList = document.getElementById('outlineList');

function sentence(s, side){
  const text = side==='en' ? s.en : s.ko;
  // <T def="..">term</T> -> term span with tooltip
  const html = text.replace(/<T def="([^"]*)">([\s\S]*?)<\/T>/g,
    (_,def,inner)=>`<span class="term" data-def="${def}">${inner}</span>`);
  return `<span class="s" data-sid="${s.sid}">${html}</span>`;
}
function figurePlaceholder(b, side){
  const cap = side==='en'? b.capEn : b.capKo;
  return `<figure class="figure" data-fid="${b.id}">
    <div class="figbox">[ ${b.id} · 원본 그림 (양쪽 동일) ]</div>
    <figcaption class="cap">${cap}</figcaption></figure>`;
}
function tableFig(b, side){
  const cap = side==='en'? b.capEn : b.capKo;
  const head = `<tr>${b.head.map(h=>`<th>${h}</th>`).join('')}</tr>`;
  const rows = b.rows.map(r=>`<tr>${r.map(c=>`<td>${c}</td>`).join('')}</tr>`).join('');
  return `<div class="tablefig" data-fid="${b.id}">
    <table class="data"><thead>${head}</thead><tbody>${rows}</tbody></table>
    <figcaption class="cap">${cap}</figcaption></div>`;
}

function render(side){
  const out=[]; const isEn = side==='en';
  for(const b of PAPER.blocks){
    if(b.type==='h1'){
      out.push(`<h1>${isEn?PAPER.titleEn:PAPER.titleKo}</h1><p class="sub">${PAPER.meta}</p>`);
    }else if(b.type==='h2'){
      out.push(`<h2 id="${isEn?b.id+'-en':b.id+'-ko'}" data-sid="${b.sid}" class="s">${isEn?b.en:b.ko}</h2>`);
    }else if(b.type==='p'){
      const pass = b.pass||'read';
      out.push(`<p data-pass="${pass}">${b.ss.map(s=>sentence(s,side)).join(' ')}</p>`);
    }else if(b.type==='figure'){
      out.push(figurePlaceholder(b,side));
    }else if(b.type==='table'){
      out.push(tableFig(b,side));
    }else if(b.type==='eq'){
      out.push(`<div class="eq" data-pass="deep">${b.tex}</div>`);
    }
  }
  return out.join('\n');
}
docL.innerHTML = render('en');
docR.innerHTML = render('ko');

/* outline */
PAPER.blocks.filter(b=>b.type==='h2').forEach(b=>{
  const a=document.createElement('a');
  a.textContent = b.ko + '  ·  ' + b.en;
  if(/^\d/.test(b.en)===false) a.className='sub';
  a.onclick=()=>{ document.getElementById(b.id+'-ko').scrollIntoView({behavior:'smooth',block:'start'});
                  document.getElementById(b.id+'-en').scrollIntoView({behavior:'smooth',block:'start'}); };
  outlineList.appendChild(a);
});

/* ---------------- hover linking (형광펜) ---------------- */
function setHL(sid,on,srcSide){
  document.querySelectorAll(`[data-sid="${sid}"]`).forEach(el=>{
    el.classList.toggle('hl',on);
    el.classList.toggle('hl-src', on && el.closest('.pane')?.classList.contains(srcSide));
  });
}
let activeSid=null;
document.querySelectorAll('.pane').forEach(pane=>{
  const side = pane.classList.contains('left')?'left':'right';
  pane.addEventListener('mouseover',e=>{
    const el=e.target.closest('[data-sid]'); if(!el) return;
    const sid=el.dataset.sid; if(sid===activeSid) return;
    if(activeSid) setHL(activeSid,false);
    activeSid=sid; setHL(sid,true,side);
  });
  pane.addEventListener('mouseleave',()=>{ if(activeSid){setHL(activeSid,false);activeSid=null;} });
  /* click a sentence -> align both panes to it */
  pane.addEventListener('click',e=>{
    const el=e.target.closest('[data-sid]'); if(!el) return;
    document.querySelectorAll(`[data-sid="${el.dataset.sid}"]`).forEach(t=>
      t.scrollIntoView({behavior:'smooth',block:'center'}));
  });
});

/* ---------------- term tooltip ---------------- */
const tip=document.getElementById('tip');
document.addEventListener('mouseover',e=>{
  const t=e.target.closest('.term'); if(!t) return;
  tip.innerHTML='<b>용어</b> · '+t.dataset.def; tip.classList.add('show');
});
document.addEventListener('mousemove',e=>{
  if(!tip.classList.contains('show')) return;
  tip.style.left=Math.min(e.clientX+14, innerWidth-320)+'px';
  tip.style.top=(e.clientY+16)+'px';
});
document.addEventListener('mouseout',e=>{ if(e.target.closest('.term')) tip.classList.remove('show'); });

/* ---------------- scroll sync + progress ---------------- */
let syncOn=true, lock=false;
const L=document.querySelector('.pane.left'), R=document.querySelector('.pane.right');
const bar=document.querySelector('#progress>div');
function pct(el){ return el.scrollTop/Math.max(1,(el.scrollHeight-el.clientHeight)); }
function mirror(from,to){
  if(!syncOn||lock) return; lock=true;
  to.scrollTop = pct(from)*(to.scrollHeight-to.clientHeight);
  bar.style.width=(pct(from)*100).toFixed(1)+'%';
  requestAnimationFrame(()=>lock=false);
}
L.addEventListener('scroll',()=>mirror(L,R));
R.addEventListener('scroll',()=>mirror(R,L));

/* ---------------- top bar controls ---------------- */
function segWire(id,fn){
  const seg=document.getElementById(id);
  seg.addEventListener('click',e=>{
    const b=e.target.closest('button'); if(!b) return;
    [...seg.children].forEach(c=>c.classList.toggle('active',c===b)); fn(b.dataset);
  });
}
segWire('passSeg',d=>applyPass(d.pass));
segWire('viewSeg',d=>{ document.getElementById('panes').className=d.view==='both'?'':d.view; });
segWire('themeSeg',d=>{ document.body.className=document.body.className.replace(/theme-\w+/,'theme-'+d.theme); });

function applyPass(pass){
  // skim: core만 / read: core+read / deep: 전부
  const show = pass==='skim'?['core']: pass==='read'?['core','read']:['core','read','deep'];
  document.querySelectorAll('#panes [data-pass]').forEach(el=>{
    el.classList.toggle('hide-pass', !show.includes(el.dataset.pass));
  });
}
applyPass('read');

document.getElementById('btnOutline').onclick=function(){
  document.body.classList.toggle('outline-hidden'); this.classList.toggle('on');
};
document.getElementById('btnFocus').onclick=function(){
  document.body.classList.toggle('focus'); this.classList.toggle('on');
};
const btnSync=document.getElementById('btnSync'); btnSync.classList.add('on');
btnSync.onclick=function(){ syncOn=!syncOn; this.classList.toggle('on',syncOn); };
</script>
</body>
</html>
